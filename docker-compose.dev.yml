services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/ecommerce
      - FRONTEND_URL=http://localhost:3001
      - SHIPMENT_WEBHOOK_SECRET=${SHIPMENT_WEBHOOK_SECRET:-}
    env_file:
      - path: ./.env
        required: false
      - path: ./.env.docker.example
        required: false
    depends_on:
      - mongodb

volumes:
  mongo_data:
